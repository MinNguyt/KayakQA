server:
  port: 8082

spring:
  application:
    name: fleet-service
  
  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:${DB_PORT:3306}/kayak_fleet_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

  # Flyway Migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # File Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # DevTools
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
    livereload:
      enabled: true

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: fleet-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        # Use local TicketEvent class for deserialization
        spring.json.value.default.type: com.example.fleet.infrastructure.messaging.TicketEvent
        # Ignore type info sent by ticket-service
        spring.json.use.type.headers: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-here-change-in-production}

# File Upload Directory
file:
  upload-dir: uploads

# Logging
logging:
  level:
    root: INFO
    com.example.fleet: DEBUG
    org.springframework.security: DEBUG

# Chatbot Embedding
chatbot:
  hf-token: ${HF_TOKEN:}

# gRPC Server
grpc:
  server:
    port: 9092
