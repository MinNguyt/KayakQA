syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.schedule.infrastructure.grpc.proto";

package chatbot;

// Schedule Search Service - used by chatbot-service via gRPC
service ScheduleSearchService {
    rpc SearchSchedules(ScheduleSearchRequest) returns (ScheduleSearchResponse);
}

message ScheduleSearchRequest {
    int32 route_id = 1;
    string departure_date = 2; // format: YYYY-MM-DD
}

message ScheduleMatch {
    int32 id = 1;
    int32 route_id = 2;
    int32 bus_id = 3;
    string departure_time = 4;
    string arrival_time = 5;
    int32 available_seats = 6;
    int32 total_seats = 7;
    string status = 8;
}

message ScheduleSearchResponse {
    repeated ScheduleMatch schedules = 1;
}
